<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Página</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        nav { background: #3f51b5; padding: 12px 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .contenido { padding: 40px; }
        h1 { color: #3f51b5; }
        .patron { color: gray; font-size: 13px; margin-top: 40px;
                  border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="/inicio">Inicio</a>
    <a href="/acerca">Acerca</a>
    <a href="/servicios">Servicios</a>
    <a href="/contacto">Contacto</a>
</nav>

<div class="contenido">
    <h1 th:text="${titulo}">Título</h1>
    <p th:text="${mensaje}">Mensaje.</p>

    <div class="patron">
        ✅ Front Controller activo:
        Petición → DispatcherServlet → PaginaController → Thymeleaf → inicio.html
    </div>
</div>

</body>
</html>
